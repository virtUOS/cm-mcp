version: '3.8'

services:
  # Development service - provides a unified environment for both MCP servers
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount the entire project for development
      - ..:/cm-mcp
    networks:
      - net_mcp
    # Keep the container running
    command: /bin/sh -c "while sleep 1000; do :; done"
