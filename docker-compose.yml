volumes:
  postgres-data:
  redis-data:

networks:
  net_mcp:
    driver: bridge


# run this inside the postgres container to restore the db  pg_restore --clean --if-exists --no-owner --no-privileges --user ${POSTGRES_USER} --dbname ${POSTGRES_DB} /tmp/backup.backup    
