services:

  db-mcp:
    build:
      context: .
      dockerfile: db-mcp/Dockerfile
    container_name: db-mcp
    env_file:
      - .env
    # Keep the container running (for development)
    command: /bin/sh -c "while sleep 1000; do :; done"
    volumes:
      - .:/cm-mcp
    environment:
      # PostgreSQL connection string
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
    networks:
      - net_mcp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ask-uos-mcp:
    build:
      context: .
      dockerfile: ask-uos-mcp/Dockerfile
    container_name: ask-uos-mcp
    env_file:
      - .env
    # Keep the container running
    command: /bin/sh -c "while sleep 1000; do :; done"
    environment:
      AI_GATEWAY_KEY: ${AI_GATEWAY_KEY}
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-https://api.openai.com/v1}
      MODEL: ${MODEL:-gpt-oss}
    volumes:
      - .:/cm-mcp
    networks:
      - net_mcp
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_started
      crawl4ai:
        condition: service_started
    restart: unless-stopped

  redis:
    container_name: mcp_redis
    image: redis:latest
    volumes:
      - redis-data:/data
    ports:
      - "6379"
    command: >
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
    networks:
      - net_mcp
    restart: always
  postgres:
    image: postgres:17-alpine
    container_name: his-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-user_password}
      POSTGRES_DB: ${POSTGRES_DB:-user_db}
      PGDATA: /var/lib/postgresql/data/pgdata
  
    networks:
      - net_mcp
    volumes:
      - postgres-data:/var/lib/postgresql/data 
      - ./2026-01-07_hisinone_edu6.backup:/tmp/backup.backup
      #- ./restore-backup.sh:/tmp/restore-backup.sh 
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-5455}:5432"  
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:0.8.0
    container_name: crawl4ai-mcp
    networks:
      - net_mcp
    ports:
      - "11235"
    restart: unless-stopped
  
volumes:
  postgres-data:
  redis-data:

networks:
  net_mcp:
    driver: bridge

